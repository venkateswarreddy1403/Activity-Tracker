<form class="glass-card form-container" (ngSubmit)="onSubmit()" #activityForm="ngForm">
  <div class="form-header">
    <h2>Record Activity</h2>
    <p>Log what you've been up to.</p>
  </div>
  
  <div class="form-group" data-tooltip="Be specific to easily track progress">
    <label for="name">Activity Name</label>
    <input 
      type="text" 
      id="name" 
      name="name" 
      [(ngModel)]="name" 
      required
      placeholder="e.g. Read a book, Code, Walk">
  </div>
  
  <div class="form-grid">
    <div class="form-group time-group" data-tooltip="How much time did you spend?">
      <label>Duration</label>
      <div class="time-inputs">
        <div class="time-input-group">
          <input 
            type="number" 
            id="hours" 
            name="hours" 
            [(ngModel)]="hours" 
            min="0"
            placeholder="0">
          <span class="unit">h</span>
        </div>
        <div class="time-input-group">
          <input 
            type="number" 
            id="minutes" 
            name="minutes" 
            [(ngModel)]="minutes" 
            min="0"
            max="59"
            placeholder="30">
          <span class="unit">m</span>
        </div>
      </div>
    </div>
    
    <div class="form-group">
      <label for="category">Category</label>
      <div class="select-wrapper">
        <select id="category" name="category" [(ngModel)]="category">
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
      </div>
    </div>
  </div>
  
  <div class="form-group">
    <label for="notes">Notes (Optional)</label>
    <textarea 
      id="notes" 
      name="notes" 
      [(ngModel)]="notes" 
      rows="3" 
      placeholder="Any details to remember?"></textarea>
  </div>
  
  <button type="submit" class="submit-btn" [disabled]="!activityForm.valid">
    <span>Save Activity</span>
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</form>
